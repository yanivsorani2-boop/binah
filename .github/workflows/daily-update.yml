name: Daily Content Update

on:
  schedule:
    # 05:00 UTC = 07:00 Israel (UTC+2) / 08:00 summer (UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate daily content
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/generate_daily.py

      - name: Commit and push new content
        run: |
          git config --global user.name  "binah-bot"
          git config --global user.email "bot@binah.co.il"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 עדכון יומי — $(date +'%Y-%m-%d')"
          git push
